<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grazielle Carvalho | Nutricionista</title>
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- CSS Custom -->
    <link rel="stylesheet" href="grazielle_carvalho.css">
</head>
<body>

    <!-- HEADER COM LOGO E BOTÃO -->
    <div class="header">
        <div class="header-container">
            <div class="logo">
                <img src="grazielle_carvalho_imagens/logo_grazielle_carvalho.png" alt="Logo">
                <span>Grazielle Carvalho</span>
            </div>
            <a href="https://tratamentoweb.com.br" target="_blank" class="btn-acessar">
                <i class="bi bi-box-arrow-up-right"></i>
                Acessar Sistema
            </a>
        </div>
    </div>

    <!-- CARROSSEL 3D -->
    <div class="carrossel-container">
        <div class="carousel-wrapper">
            <div id="carrossel3d" class="carousel-3d"></div>
        </div>
        <div class="carousel-controls">
            <button id="btnPrev" class="btn-carousel">
                <i class="bi bi-chevron-left"></i>
            </button>
            <span id="gestoraCounter" class="carousel-counter">1 / 6</span>
            <button id="btnNext" class="btn-carousel">
                <i class="bi bi-chevron-right"></i>
            </button>
        </div>
    </div>

    <script src="grazielle_carvalho.js"></script>
</body>
</html>
