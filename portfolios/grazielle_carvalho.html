<!-- Após a hero section ou em uma nova seção -->
<!-- SEÇÃO CONCEITOS (igual ao Setor de Acessos) -->
<div class="conceitos-section">
    <div class="container">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="conceito-card" data-conceito="nutricao">
                    <div class="conceito-icon">
                        <i class="bi bi-egg-fried"></i>
                    </div>
                    <h3>Nutrição Clínica</h3>
                    <p>Clique para entender o conceito</p>
                    <i class="bi bi-arrow-right-circle"></i>
                </div>
            </div>
            <div class="col-md-4">
                <div class="conceito-card" data-conceito="esportiva">
                    <div class="conceito-icon">
                        <i class="bi bi-bicycle"></i>
                    </div>
                    <h3>Nutrição Esportiva</h3>
                    <p>Clique para entender o conceito</p>
                    <i class="bi bi-arrow-right-circle"></i>
                </div>
            </div>
            <div class="col-md-4">
                <div class="conceito-card" data-conceito="comportamental">
                    <div class="conceito-icon">
                        <i class="bi bi-heart"></i>
                    </div>
                    <h3>Nutrição Comportamental</h3>
                    <p>Clique para entender o conceito</p>
                    <i class="bi bi-arrow-right-circle"></i>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- CARROSSEL 3D (em vez do Bootstrap Carousel) -->
<div class="gestoras-section">
    <div class="container">
        <h2 class="section-title">
            <i class="bi bi-camera-fill me-2"></i>
            Meu Trabalho
        </h2>
        <div class="carousel-container">
            <div class="carousel-wrapper">
                <div id="carrossel3d" class="carousel-3d"></div>
            </div>
            <div class="carousel-controls">
                <button id="btnPrev" class="btn-carousel">
                    <i class="bi bi-chevron-left"></i>
                </button>
                <span id="gestoraCounter" class="carousel-counter">1 / 8</span>
                <button id="btnNext" class="btn-carousel">
                    <i class="bi bi-chevron-right"></i>
                </button>
            </div>
        </div>
    </div>
</div>
